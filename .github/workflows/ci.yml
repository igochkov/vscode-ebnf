name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify generated parser matches the grammar (drift guard)
        run: |
          npm run generate
          git diff --exit-code -- src/parser \
            || (echo "::error::src/parser is out of date with grammar/*.g4 — run 'npm run generate' and commit the result." && exit 1)

      - name: Type-check (strict)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package (validates the production webpack build)
        run: npx --yes @vscode/vsce@3.9.2 package --no-dependencies -o vscode-ebnf.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-ebnf.vsix
          if-no-files-found: error
